name: "build"

on:
  pull_request:
  workflow_dispatch:

jobs:
  build-tauri:
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            rust-targets: x86_64-unknown-linux-gnu
            tauri-args: ""
            artifact-name: "toerings-linux-x86_64"
          - platform: macos-15
            rust-targets: aarch64-apple-darwin
            tauri-args: "--target aarch64-apple-darwin --bundles app"
            artifact-name: "toerings-macos-aarch64"
          - platform: macos-15
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
            tauri-args: "--target universal-apple-darwin --bundles app"
            artifact-name: "toerings-macos-universal"
          - platform: "windows-latest"
            rust-targets: "x86_64-pc-windows-msvc"
            tauri-args: "--target x86_64-pc-windows-msvc --bundles nsis"
            artifact-name: "toerings-windows-x86_64"

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - name: setup node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 24
      - name: install Rust stable
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          targets: ${{ matrix.rust-targets }}
      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf rpm squashfs-tools xvfb
      - name: install frontend dependencies
        run: npm ci
      - uses: tauri-apps/tauri-action@1deb371b0cd8bd54025b384f1cd735e725c4060f # v1
        id: tauri
        with:
          args: ${{ matrix.tauri-args }}
      - name: repack AppImage without host infrastructure libraries
        if: matrix.platform == 'ubuntu-22.04'
        env:
          ARTIFACT_PATHS: ${{ steps.tauri.outputs.artifactPaths }}
        run: |
          appimage_path=$(jq -r '.[] | select(endswith(".AppImage"))' <<< "$ARTIFACT_PATHS")
          test -n "$appimage_path"
          scripts/repack-appimage.sh "$appimage_path"
      - name: validate Linux bundles
        if: matrix.platform == 'ubuntu-22.04'
        env:
          ARTIFACT_PATHS: ${{ steps.tauri.outputs.artifactPaths }}
        run: |
          deb_path=$(jq -r '.[] | select(endswith(".deb"))' <<< "$ARTIFACT_PATHS")
          rpm_path=$(jq -r '.[] | select(endswith(".rpm"))' <<< "$ARTIFACT_PATHS")
          appimage_path=$(jq -r '.[] | select(endswith(".AppImage"))' <<< "$ARTIFACT_PATHS")
          test -n "$deb_path" && test -n "$rpm_path" && test -n "$appimage_path"
          scripts/validate-linux-bundles.sh "$deb_path" "$rpm_path" "$appimage_path"
      - name: verify macOS app signature
        if: startsWith(matrix.platform, 'macos')
        env:
          ARTIFACT_PATHS: ${{ steps.tauri.outputs.artifactPaths }}
        run: |
          app_path=$(jq -r '.[] | select(endswith(".app"))' <<< "$ARTIFACT_PATHS" | head -n 1)
          test -n "$app_path"
          codesign --verify --deep --strict --verbose=4 "$app_path"
      - name: "create portable Windows ZIP"
        if: matrix.platform == 'windows-latest'
        id: portable
        shell: pwsh
        run: |
          $version = (Get-Content "package.json" | ConvertFrom-Json).version
          $binaryPath = "src-tauri/target/x86_64-pc-windows-msvc/release/ToeRings.exe"
          $archivePath = Join-Path $env:RUNNER_TEMP "ToeRings_${version}_windows_x86_64_portable.zip"
          if (-not (Test-Path -LiteralPath $binaryPath)) {
            throw "Windows executable not found: $binaryPath"
          }
          Compress-Archive -LiteralPath $binaryPath -DestinationPath $archivePath
          $checksumPath = "$archivePath.sha256"
          $checksum = (Get-FileHash -Algorithm SHA256 -LiteralPath $archivePath).Hash.ToLowerInvariant()
          $checksumLine = "$checksum  $([System.IO.Path]::GetFileName($archivePath))`n"
          [System.IO.File]::WriteAllText(
            $checksumPath,
            $checksumLine,
            [System.Text.UTF8Encoding]::new($false)
          )
          "path=$archivePath" >> $env:GITHUB_OUTPUT
          "checksum-path=$checksumPath" >> $env:GITHUB_OUTPUT
      - name: collect artifact paths
        id: artifacts
        env:
          ARTIFACT_PATHS: ${{ steps.tauri.outputs.artifactPaths }}
        run: |
          node -e '
            const fs = require("fs")
            const paths = JSON.parse(process.env.ARTIFACT_PATHS)
            const output = `paths<<EOF\n${paths.join("\n")}\nEOF\n`
            fs.appendFileSync(process.env.GITHUB_OUTPUT, output)
          '
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ steps.artifacts.outputs.paths }}
          if-no-files-found: error
      - name: "upload portable Windows ZIP"
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: "toerings-windows-x86_64-portable"
          path: |
            ${{ steps.portable.outputs.path }}
            ${{ steps.portable.outputs.checksum-path }}
          if-no-files-found: error
