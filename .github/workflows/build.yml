name: "build"

on:
  pull_request:
  workflow_dispatch:

jobs:
  build-tauri:
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            rust-targets: x86_64-unknown-linux-gnu
            tauri-args: ""
            artifact-name: "toerings-linux-x86_64"
          - platform: macos-15
            rust-targets: aarch64-apple-darwin
            tauri-args: "--target aarch64-apple-darwin --bundles app"
            artifact-name: "toerings-macos-aarch64"
          - platform: macos-15
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
            tauri-args: "--target universal-apple-darwin --bundles app"
            artifact-name: "toerings-macos-universal"

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v7
      - name: setup node
        uses: actions/setup-node@v7
        with:
          node-version: 24
      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}
      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf
      - name: install frontend dependencies
        run: npm ci
      - uses: tauri-apps/tauri-action@v0
        id: tauri
        with:
          args: ${{ matrix.tauri-args }}
      - name: verify macOS app signature
        if: startsWith(matrix.platform, 'macos')
        env:
          ARTIFACT_PATHS: ${{ steps.tauri.outputs.artifactPaths }}
        run: |
          app_path=$(jq -r '.[] | select(endswith(".app"))' <<< "$ARTIFACT_PATHS" | head -n 1)
          test -n "$app_path"
          codesign --verify --deep --strict --verbose=4 "$app_path"
      - name: collect artifact paths
        id: artifacts
        env:
          ARTIFACT_PATHS: ${{ steps.tauri.outputs.artifactPaths }}
        run: |
          echo "paths<<EOF" >> "$GITHUB_OUTPUT"
          jq -r ".[]" <<< "$ARTIFACT_PATHS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ steps.artifacts.outputs.paths }}
          if-no-files-found: error
