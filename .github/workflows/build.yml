name: "build"

on:
  pull_request:
  workflow_dispatch:

jobs:
  build-tauri:
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            rust-targets: x86_64-unknown-linux-gnu
            tauri-args: ""
            artifact-name: "toerings-linux-x86_64"
          - platform: macos-15
            rust-targets: aarch64-apple-darwin
            tauri-args: "--target aarch64-apple-darwin"
            artifact-name: "toerings-macos-aarch64"
          - platform: macos-15
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
            tauri-args: "--target universal-apple-darwin"
            artifact-name: "toerings-macos-universal"

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v7
      - name: setup node
        uses: actions/setup-node@v7
        with:
          node-version: 18
      - name: install Rust 1.66.1 (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        uses: dtolnay/rust-toolchain@1.66.1
        with:
          targets: ${{ matrix.rust-targets }}
      - name: install Rust stable (macos only)
        if: matrix.platform != 'ubuntu-22.04'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}
      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf
      - name: install frontend dependencies
        run: npm ci
      - uses: tauri-apps/tauri-action@v0
        id: tauri
        with:
          args: ${{ matrix.tauri-args }}
      - name: collect artifact paths
        id: artifacts
        env:
          ARTIFACT_PATHS: ${{ steps.tauri.outputs.artifactPaths }}
        run: |
          echo "paths<<EOF" >> "$GITHUB_OUTPUT"
          jq -r ".[]" <<< "$ARTIFACT_PATHS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ steps.artifacts.outputs.paths }}
          if-no-files-found: error
