name: "publish"

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  create-release:
    permissions:
      contents: write
    runs-on: ubuntu-24.04
    outputs:
      release_id: ${{ steps.create-release.outputs.result }}

    steps:
      - name: create release
        id: create-release
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const tagName = context.ref.replace("refs/tags/", "")
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tagName,
              name: `ToeRings ${tagName}`,
              body: [
                "Download the bundle for your platform from the assets below.",
                "",
                "macOS builds are ad-hoc signed but cannot be notarized without a paid Apple Developer Program membership. On first launch, Control-click ToeRings and choose Open. See the README for additional Gatekeeper instructions."
              ].join("\n"),
              draft: true,
              prerelease: false,
              generate_release_notes: true
            })
            return data.id

  build-tauri:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            rust-targets: x86_64-unknown-linux-gnu
            tauri-args: ""
            archive-arch: ""
          - platform: macos-15
            rust-targets: aarch64-apple-darwin
            tauri-args: "--target aarch64-apple-darwin --bundles app"
            archive-arch: "aarch64"
          - platform: macos-15
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
            tauri-args: "--target universal-apple-darwin --bundles app"
            archive-arch: "universal"

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: setup node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 24
      - name: install Rust stable
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          targets: ${{ matrix.rust-targets }}
      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf rpm squashfs-tools xvfb
      - name: install frontend dependencies
        run: npm ci
      - uses: tauri-apps/tauri-action@1deb371b0cd8bd54025b384f1cd735e725c4060f # v1
        id: tauri
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.tauri-args }}
      - name: repack AppImage without host infrastructure libraries
        if: matrix.platform == 'ubuntu-22.04'
        env:
          ARTIFACT_PATHS: ${{ steps.tauri.outputs.artifactPaths }}
        run: |
          appimage_path=$(jq -r '.[] | select(endswith(".AppImage"))' <<< "$ARTIFACT_PATHS")
          test -n "$appimage_path"
          scripts/repack-appimage.sh "$appimage_path"
      - name: validate Linux bundles
        if: matrix.platform == 'ubuntu-22.04'
        env:
          ARTIFACT_PATHS: ${{ steps.tauri.outputs.artifactPaths }}
        run: |
          deb_path=$(jq -r '.[] | select(endswith(".deb"))' <<< "$ARTIFACT_PATHS")
          rpm_path=$(jq -r '.[] | select(endswith(".rpm"))' <<< "$ARTIFACT_PATHS")
          appimage_path=$(jq -r '.[] | select(endswith(".AppImage"))' <<< "$ARTIFACT_PATHS")
          test -n "$deb_path" && test -n "$rpm_path" && test -n "$appimage_path"
          scripts/validate-linux-bundles.sh "$deb_path" "$rpm_path" "$appimage_path"
      - name: upload Linux bundles
        if: matrix.platform == 'ubuntu-22.04'
        env:
          ARTIFACT_PATHS: ${{ steps.tauri.outputs.artifactPaths }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          jq -r '.[] | select(endswith(".deb") or endswith(".rpm") or endswith(".AppImage"))' \
            <<< "$ARTIFACT_PATHS" | while read -r artifact_path; do
              gh release upload "$GITHUB_REF_NAME" "$artifact_path"
            done
      - name: verify macOS app signature
        if: startsWith(matrix.platform, 'macos')
        env:
          ARTIFACT_PATHS: ${{ steps.tauri.outputs.artifactPaths }}
        run: |
          app_path=$(jq -r '.[] | select(endswith(".app"))' <<< "$ARTIFACT_PATHS" | head -n 1)
          test -n "$app_path"
          codesign --verify --deep --strict --verbose=4 "$app_path"
      - name: upload macOS app archive
        if: startsWith(matrix.platform, 'macos')
        env:
          ARTIFACT_PATHS: ${{ steps.tauri.outputs.artifactPaths }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          app_path=$(jq -r '.[] | select(endswith(".app"))' <<< "$ARTIFACT_PATHS" | head -n 1)
          archive_path="$RUNNER_TEMP/ToeRings_${GITHUB_REF_NAME#v}_${{ matrix['archive-arch'] }}.app.zip"
          ditto -c -k --sequesterRsrc --keepParent "$app_path" "$archive_path"
          gh release upload "$GITHUB_REF_NAME" "$archive_path"

  publish-release:
    permissions:
      contents: write
    runs-on: ubuntu-24.04
    needs: [create-release, build-tauri]

    steps:
      - name: publish release
        id: publish-release
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        env:
          release_id: ${{ needs.create-release.outputs.release_id }}
        with:
          script: |
            github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: process.env.release_id,
              draft: false,
              prerelease: false
            })
      - name: "request Homebrew cask update"
        env:
          HOMEBREW_CASK_DISPATCH_TOKEN: ${{ secrets.HOMEBREW_CASK_DISPATCH_TOKEN }}
        run: |
          curl --fail-with-body --silent --show-error \
            --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${HOMEBREW_CASK_DISPATCH_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/ChrisLauinger77/homebrew-cask/dispatches \
            --data '{"event_type":"update-cask","client_payload":{"cask":"toerings"}}'
